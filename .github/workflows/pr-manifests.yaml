name: Validate PRs

on:
  pull_request:
    branches:
      - main
    paths:
      - 'api/**'
      - 'manifests/**'

jobs:
  validate-manifests:
    name: Check CRD manifests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Regenerate Manifests
        run: make manifests

      # Check if a change was produces by make manifests command.
      # If yes, then the check should fail and ask to generate manifests.
      - name: Check if manifests are up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Generated manifests are out of sync with code changes."
            echo "Please run 'make manifests' locally and commit the changes."
            git --no-pager diff
            exit 1
          fi

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: konflux

      - name: Apply Manifests
        run: |
          kubectl apply -f manifests/application-api-customresourcedefinitions.yaml
          kubectl get crds
